<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowStock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <img class="banner-logo" src="resources/img/1.png" alt="">
        <div class="login">
            <h1>Bem-vindo ao FlowStock!</h1>
            <input type="text" class="login-inputs" id="login-email" placeholder="Digite seu email">
            <input type="text" class="login-inputs" id="login-password" placeholder="Digite sua senha">
            <input type="submit" id="login-submit" value="ENTRAR">
            <a href="#" id="login-forgotpassword">Esqueci minha senha</a>
            <input type="submit" id="login-register" value="CADASTRAR">
        </div>
    </div>
</body>
</html>
