<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowStock</title>
    <link rel="stylesheet" href="/src/login/CSS/register.css">
</head>
<body>
    <div class="content">
        <img class="banner-logo" src="/resources/imgs/1.png" alt="">
        <form class="form" id="login-form" action="" method="post">
            <h1>Junte-se a nós!</h1>
            <input type="text" class="inputs" id="login-name" placeholder="Digite seu nome de usuário">
            <input type="email" class="inputs" id="login-email" placeholder="Digite seu email">
            <input type="password" class="inputs" placeholder="Digite sua senha">
            <input type="password" class="inputs" placeholder="Confirme sua senha">
            <input type="submit" id="login-submit" value="ENTRAR">
        </form>
    </div>
</body>
</html>
