<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowStock</title>
    <link rel="stylesheet" href="/src/login/CSS/index.css">
</head>
<body>
    <div class="content">
        <img class="banner-logo" src="/resources/imgs/1.png" alt="">
        <form class="form" id="login-form" action="" method="post">
            <h1>Bem-vindo ao FlowStock!</h1>
            <input type="email" class="inputs" id="login-email" placeholder="Digite seu email">
            <input type="password" class="inputs" id="login-password" placeholder="Digite sua senha">
            <input type="submit" id="login-submit" value="ENTRAR">
            <a href="/src/login/HTML/redef_pass.html" id="login-forgotpassword">Esqueci minha senha</a>
            <input type="button" id="login-register" value="CADASTRAR">
        </form>
    </div>
</body>
</html>
